<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎉 Felicidades</title>
    <style>
        /* ===== RESET Y FONDO ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #fdfcfb 0%, #e2d1c3 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        /* ===== TÍTULO "FELICIDADES" ===== */
        .titulo {
            position: relative;
            top: -90px;
            font-size: 4.5rem;
            font-weight: 800;
            color: #ff6f61;
            text-shadow: 0 4px 20px rgba(255, 111, 97, 0.3);
            margin-bottom: 20px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInTitulo 2s ease forwards;
            animation-delay: 5.2s;
            transform-origin: center;
        }
        @keyframes fadeInTitulo {
            0% {
                opacity: 0;
                transform: scale(0.85);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== PASTEL ===== */
        .pastel-wrapper {
            position: relative;
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pastel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Cada capa del pastel */
        .capa {
            width: 100%;
            height: 45px;
            border-radius: 18px 18px 6px 6px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            opacity: 0;
            animation: caerCapa 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            margin-bottom: 3px;
        }
        .capa:last-of-type {
            margin-bottom: 0;
        }

        /* Colores y retardos individuales */
        #capa1 {
            background: #8B4513;
            animation-delay: 0.4s;
        }
        #capa2 {
            background: #FFB6C1;
            animation-delay: 1.4s;
        }
        #capa3 {
            background: #F5DEB3;
            animation-delay: 2.4s;
        }

        /* Glaseado (capa superior) */
        #glaseado {
            background: #FFF8F0;
            height: 32px;
            border-radius: 20px 20px 10px 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            width: 105%;
            margin-bottom: 0;
            animation-delay: 3.4s;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* ===== VELA (posición absoluta sobre el glaseado) ===== */
        .vela-container {
            position: absolute;
            bottom: calc(100% - 8px); /* se coloca justo encima del glaseado */
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 68px;
            opacity: 0;
            animation: caerVela 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 4.5s;
            transform-origin: bottom center;
            z-index: 2;
        }

        .vela {
            width: 100%;
            height: 100%;
            background: #FF6347;
            border-radius: 6px 6px 3px 3px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* Llama de la vela */
        .llama {
            width: 22px;
            height: 34px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FF8C00 70%, #FF4500);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 30px #FF8C00, 0 0 60px #FF4500;
            animation: parpadeo 0.6s infinite alternate ease-in-out;
        }

        @keyframes parpadeo {
            0% {
                transform: translateX(-50%) scale(1);
                opacity: 0.85;
                box-shadow: 0 0 20px #FF8C00;
            }
            100% {
                transform: translateX(-50%) scale(1.15);
                opacity: 1;
                box-shadow: 0 0 40px #FF8C00, 0 0 80px #FF4500;
            }
        }

        /* ===== ANIMACIONES DE CAÍDA ===== */
        @keyframes caerCapa {
            0% {
                transform: translateY(-500px) rotate(-2deg);
                opacity: 0;
            }
            60% {
                transform: translateY(12px) rotate(0.5deg);
                opacity: 1;
            }
            80% {
                transform: translateY(-6px) rotate(0deg);
            }
            100% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
        }

        /* La vela cae desde arriba y se posiciona en el centro del contenedor */
        @keyframes caerVela {
            0% {
                transform: translate(-50%, -600px) rotate(-5deg);
                opacity: 0;
            }
            55% {
                transform: translate(-50%, 18px) rotate(1deg);
                opacity: 1;
            }
            75% {
                transform: translate(-50%, -6px) rotate(0deg);
            }
            100% {
                transform: translate(-50%, 0) rotate(0deg);
                opacity: 1;
            }
        }

        /* ===== CONFETI / DECORACIÓN DE FONDO ===== */
        .confeti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .confeti span {
            position: absolute;
            display: block;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            opacity: 0.2;
            animation: flotar 12s infinite linear;
        }

        .confeti span:nth-child(1) {
            background: #ff6f61;
            left: 10%;
            animation-delay: 0s;
            width: 8px;
            height: 8px;
        }
        .confeti span:nth-child(2) {
            background: #f7d44a;
            left: 25%;
            animation-delay: 2s;
            width: 14px;
            height: 6px;
        }
        .confeti span:nth-child(3) {
            background: #6fc1b0;
            left: 45%;
            animation-delay: 4s;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .confeti span:nth-child(4) {
            background: #ff9a76;
            left: 65%;
            animation-delay: 1s;
            width: 12px;
            height: 8px;
        }
        .confeti span:nth-child(5) {
            background: #c7a9d9;
            left: 80%;
            animation-delay: 3s;
            width: 8px;
            height: 12px;
            border-radius: 50%;
        }
        .confeti span:nth-child(6) {
            background: #ffb347;
            left: 92%;
            animation-delay: 5s;
            width: 14px;
            height: 6px;
        }

        @keyframes flotar {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 0.3;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .titulo {
                font-size: 2.8rem;
                margin-bottom: 20px;
            }
            .pastel-wrapper {
                max-width: 200px;
            }
            .capa {
                height: 32px;
                border-radius: 12px 12px 4px 4px;
            }
            #glaseado {
                height: 24px;
            }
            .vela-container {
                width: 14px;
                height: 50px;
                bottom: calc(100% - 6px);
            }
            .llama {
                width: 18px;
                height: 26px;
                top: -22px;
            }
        }

        @media (max-width: 400px) {
            .titulo {
                font-size: 2rem;
            }
            .pastel-wrapper {
                max-width: 150px;
            }
            .capa {
                height: 26px;
            }
            #glaseado {
                height: 20px;
            }
            .vela-container {
                width: 12px;
                height: 40px;
                bottom: calc(100% - 4px);
            }
            .llama {
                width: 14px;
                height: 20px;
                top: -18px;
            }
        }
    </style>
</head>
<body>

    <!-- Decoración de confeti -->
    <div class="confeti">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

    <!-- Contenido principal -->
    <div class="container">
        <h1 class="titulo"> ¡Felicidades Dulce! </h1>

        <div class="pastel-wrapper">
            <div class="pastel">
                <!-- Capas del pastel (orden: base → intermedia → superior → glaseado) -->
                <div class="capa" id="glaseado"></div>
                <div class="capa" id="capa3"></div>
                <div class="capa" id="capa2"></div>
                <div class="capa" id="capa1"></div>
                
            </div>

            <!-- Vela posicionada absolutamente encima del glaseado -->
            <div class="vela-container">
                <div class="vela">
                    <div class="llama"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            console.log('🎂 ¡Felicidades! Que tengas un gran día.');
        })();
    </script>
</body>
</html>
